<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Skrutable Sanskrit Tools</title>
  <link rel="stylesheet" href="skrutable.css">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>

<div id="sidebar-overlay" class="sidebar-overlay"></div>

<div class="mobile-header">
  <button class="burger" id="sidebar-burger" aria-label="Toggle navigation">&#9776;</button>
  <a class="brand" href="#">skrutable</a>
</div>

<aside class="sidebar" id="sidebar">

  <div class="sidebar-brand">
    <h1>skrutable</h1>
  </div>

  <div class="sidebar-controls">

    <!-- Transliterate + schemes -->
    <div class="action-row">
      <button type="button" id="transliterate_button" class="btn btn-primary action-btn">Transliterate</button>
      <div class="action-options scheme-options-row">
        <div class="scheme-labels">
          <label class="scheme-label">in: <select id="from_scheme">
            <option value="Auto" id="auto_scheme_option">Auto</option>
            <optgroup label="Romanizations">
              <option value="IAST">IAST</option>
              <option value="HK">HK</option>
              <option value="SLP">SLP</option>
              <option value="ITRANS">ITRANS</option>
              <option value="VH">VH</option>
              <option value="WX">WX</option>
            </optgroup>
            <optgroup label="Indic Scripts">
              <option value="DEV">DEV</option>
              <option value="BENGALI">BENGALI</option>
              <option value="GUJARATI">GUJARATI</option>
            </optgroup>
          </select></label>
          <label class="scheme-label">out: <select id="to_scheme">
            <optgroup label="Romanizations">
              <option value="IAST">IAST</option>
              <option value="HK">HK</option>
              <option value="SLP">SLP</option>
              <option value="ITRANS">ITRANS</option>
              <option value="VH">VH</option>
              <option value="WX">WX</option>
            </optgroup>
            <optgroup label="Indic Scripts">
              <option value="DEV">DEV</option>
              <option value="BENGALI">BENGALI</option>
              <option value="GUJARATI">GUJARATI</option>
            </optgroup>
          </select></label>
        </div>
        <button type="button" id="swap_scheme_button" class="btn btn-primary btn-swap-scheme" title="Swap in/out schemes">&#8645;</button>
      </div>
    </div>

    <!-- Scan + detail checkboxes -->
    <div class="action-row">
      <button type="button" id="scan_button" class="btn btn-primary action-btn">Scan</button>
      <div class="action-options">
        <div class="checkbox-group">
          <label><input type="checkbox" id="weights" checked/> lglgl</label>
          <label><input type="checkbox" id="morae" checked/> {mora}</label>
          <label><input type="checkbox" id="gaRas" checked/> [ga&#7751;a]</label>
          <label><input type="checkbox" id="alignment" checked/> align</label>
        </div>
      </div>
    </div>

    <!-- Identify Meter + resplit -->
    <div class="action-row">
      <button type="button" id="identify_meter_button" class="btn btn-primary action-btn">Identify Meter</button>
      <div class="action-options">
        <select id="resplit_option">
          <option value="none">don't resplit</option>
          <option value="resplit_lite">resplit lite</option>
          <option value="resplit_lite_keep_mid">resplit lite keep mid</option>
          <option value="resplit_max" selected>resplit max</option>
          <option value="resplit_max_keep_mid">resplit max keep mid</option>
        </select>
      </div>
    </div>

    <!-- Split Words + model -->
    <div class="action-row">
      <button type="button" id="split_button" class="btn btn-primary action-btn">Split Words</button>
      <div class="action-options">
        <label class="scheme-label scheme-label-wide">model: <select id="splitter_model_sidebar">
          <option value="dharmamitra_2024_sept">2024 ByT5-Sanskrit</option>
          <option value="splitter_2018">2018 Sandhi &amp; Compound</option>
        </select></label>
      </div>
    </div>

  </div><!-- .sidebar-controls -->

  <hr class="sidebar-divider">

  <div class="sidebar-bottom">
    <a href="#" id="clear-texts-link">clear</a>
    <a href="https://www.skrutable.info/?example=1" target="_blank" rel="noopener">ex</a>
    <a href="#" id="settings-link">settings</a>
    <a href="https://www.skrutable.info/help" target="_blank" rel="noopener">help</a>
    <a href="#" id="dark-mode-toggle" title="Toggle dark mode">&#9790;</a>
  </div>

</aside>

<main class="main-content" id="main-content">

  <!-- Workbench view -->
  <div id="workbench-view">
    <div class="textarea-swap-group">
      <textarea id="text_input" class="textarea-input" rows="4" spellcheck="false"
        placeholder="Enter text here"></textarea>
      <div class="textarea-action-row">
        <button type="button" id="clear_textareas_button" class="btn btn-primary btn-textarea-action" title="Clear text boxes">&#x2715;</button>
        <button type="button" class="btn btn-primary btn-textarea-action"
          id="repeat_action_button" title="Repeat last action" disabled>&#x21BA;</button>
        <button type="button" id="swap_texts_button" class="btn btn-primary btn-textarea-action" title="Swap in/out text">&#8645;</button>
      </div>
      <textarea id="text_output" class="textarea-output" rows="15" spellcheck="false"
        readonly></textarea>
    </div>

    <!-- Melody player -->
    <div class="melody-player" id="melodyPlayer">
      <audio id="audio" controls>
        <source type="audio/mp3">
      </audio>
      <div>
        <label for="melody_option">Meter Melody Type Recited by</label>
        <select id="melody_option"></select>
      </div>
    </div>
  </div>

  <!-- Settings overlay (replaces /settings page) -->
  <div id="settings-view" style="display:none;" class="page-content">
    <a href="#" id="back-to-workbench-link">&larr; back</a>
    <h2>extra settings</h2>

    <h3>transliteration</h3>
    <div class="settings-group">
      <div><input type="checkbox" id="avoid_virama"> <label for="avoid_virama">avoid vir&#257;ma in Indic output (<span id="virama_example_on">किमकुर्वत</span><span id="virama_example_off" style="display:none">किम् अकुर्वत</span>)</label></div>
      <div><input type="checkbox" id="avoid_virama_non_indic"> <label for="avoid_virama_non_indic">un-space Roman output (<span id="virama_non_indic_example_on">kimakurvata</span><span id="virama_non_indic_example_off" style="display:none">kim akurvata</span>)</label></div>
      <div><input type="checkbox" id="preserve_anunasika"> <label for="preserve_anunasika">preserve anun&#257;sika i.e. candrabindu (<span id="anunasika_example_on">ã / अँ</span><span id="anunasika_example_off" style="display:none">aṃ / अं</span>)</label></div>
    </div>

    <h3>splitting</h3>
    <div class="settings-group">
      <div><input type="checkbox" id="preserve_punctuation"> <label for="preserve_punctuation">preserve punctuation</label></div>
      <div><label for="splitter_model_settings">model: <select id="splitter_model_settings">
        <option value="dharmamitra_2024_sept">2024 ByT5-Sanskrit by Dharmamitra</option>
        <option value="splitter_2018">2018 Sandhi and Compound Splitter</option>
      </select></label></div>
      <div id="preserve_compound_hyphens_row"><input type="checkbox" id="preserve_compound_hyphens"> <label for="preserve_compound_hyphens">preserve compound hyphens (<span id="hyphens_example_on">dharma-k&#7779;etre</span><span id="hyphens_example_off" style="display:none">dharma k&#7779;etre</span>)</label></div>
    </div>

    <h3>display</h3>
    <div class="settings-group">
      <label>font size: <select id="font_size_select">
        <option value="small">Small</option>
        <option value="medium">Medium</option>
        <option value="large">Large</option>
      </select></label>
    </div>

    <h3>restore defaults</h3>
    <div class="settings-group">
      <button type="button" class="btn btn-primary" id="reset_extra_button">Reset Extra Settings</button>
      <button type="button" class="btn btn-primary" id="reset_all_button">Reset ALL Settings</button>
    </div>
  </div>

</main>

<script src="../js/vendor/webextension-polyfill.min.js"></script>
<script src="__SKRUTABLE_BUNDLE_SRC__"></script>
<script src="../js/sidepanel/index.js"></script>

</body>
</html>
